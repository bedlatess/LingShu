# 灵枢前端 Nginx 配置
# - 端口 80：用户端（公开门面）
# - 端口 8081：管理端（内部使用，建议仅在内网或加 IP 白名单暴露）
# - /api、/v1、/healthz 反代到 compose 内的 app 服务（后端容器名:8080）

upstream lingshu_backend {
    server app:8080;
}

# 反代到后端的公共片段
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html/user;
    index index.html;

    # 前端静态资源 + SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 平台管理类 API
    location /api/ {
        proxy_pass http://lingshu_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAI 兼容网关（含流式 SSE，需关闭缓冲并支持长连接）
    location /v1/ {
        proxy_pass http://lingshu_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location = /healthz {
        proxy_pass http://lingshu_backend;
    }
}

server {
    listen 8081;
    server_name _;
    root /usr/share/nginx/html/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://lingshu_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass http://lingshu_backend;
    }
}
